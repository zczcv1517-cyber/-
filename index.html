<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Tetris Full Anthem - Coding Partner</title>
    <style>
        body { background: #0f0f13; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .game-container { display: flex; gap: 25px; padding: 25px; background: #1c1c25; border-radius: 15px; box-shadow: 0 0 40px rgba(13, 194, 255, 0.3); position: relative; border: 1px solid #333; }
        canvas { border: 3px solid #444; background-color: #000; border-radius: 5px; }
        .stats { display: flex; flex-direction: column; justify-content: flex-start; width: 160px; gap: 15px; }
        .stat-box { background: #2a2a35; padding: 15px; border-radius: 8px; text-align: center; border: 1px solid #444; }
        .stat-label { font-size: 0.75em; color: #0dc2ff; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .stat-value { font-size: 1.6em; font-weight: bold; font-family: 'Courier New', Courier, monospace; }
        #next { background: #000; border: 1px solid #444; margin-top: 10px; border-radius: 4px; }
        .controls { font-size: 0.75em; color: #777; line-height: 1.8; margin-top: auto; padding: 10px; background: #15151e; border-radius: 5px; }
        #start-msg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; cursor: pointer; border-radius: 15px; }
        #start-msg h1 { color: #0dc2ff; margin-bottom: 10px; text-shadow: 0 0 15px #0dc2ff; }
        #start-msg p { font-size: 1.2em; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="game-container">
    <div id="start-msg">
        <h1>TETRIS ULTIMATE</h1>
        <p>CLICK TO START & PLAY BGM</p>
    </div>
    <div>
        <canvas id="tetris" width="240" height="400"></canvas>
    </div>
    <div class="stats">
        <div class="stat-box">
            <div class="stat-label">Next</div>
            <canvas id="next" width="100" height="100"></canvas>
        </div>
        <div class="stat-box">
            <div class="stat-label">Score</div>
            <div id="score" class="stat-value">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Level</div>
            <div id="level" class="stat-value">1</div>
        </div>
        <div class="controls">
            <b>Arrows</b> : Move & Drop<br>
            <b>Q, W</b> : Rotate Piece
        </div>
    </div>
</div>

<script>
// --- 정교한 오디오 스케줄러 및 풀 버전 BGM ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playNote(freq, start, duration, type = 'square', volume = 0.03) {
    if (freq === 0) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, start);
    gain.gain.setValueAtTime(volume, start);
    gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(start);
    osc.stop(start + duration);
}

// 테트리스 풀 버전 멜로디 데이터
const E5 = 659.25, B4 = 493.88, C5 = 523.25, D5 = 587.33, A4 = 440.00, G4 = 392.00, F4 = 349.23, E4 = 329.63;
const fullMelody = [
    // Part A
    [E5, 2], [B4, 1], [C5, 1], [D5, 2], [C5, 1], [B4, 1], [A4, 2], [A4, 1], [C5, 1], [E5, 2], [D5, 1], [C5, 1],
    [B4, 3], [C5, 1], [D5, 2], [E5, 2], [C5, 2], [A4, 2], [A4, 2], [0, 2],
    // Part B
    [D5, 3], [F4, 1], [A4, 2], [G4, 1], [F4, 1], [E5, 3], [C5, 1], [E5, 2], [D5, 1], [C5, 1],
    [B4, 2], [B4, 1], [C5, 1], [D5, 2], [E5, 2], [C5, 2], [A4, 2], [A4, 2], [0, 2],
    // Part C (High)
    [E4, 4], [C5, 4], [D5, 4], [B4, 4], [C5, 4], [A4, 4], [G4, 4], [B4, 4],
    [E4, 4], [C5, 4], [D5, 4], [B4, 4], [C5, 2], [E5, 2], [A5, 4], [G5, 4] 
];

function startBGM() {
    const step = 0.13; // 속도 (낮을수록 빠름)
    let nextNoteTime = audioCtx.currentTime;

    function scheduler() {
        while (nextNoteTime < audioCtx.currentTime + 0.1) {
            fullMelody.forEach(([freq, dur]) => {
                // 메인 멜로디
                playNote(freq, nextNoteTime, dur * step, 'triangle', 0.04);
                // 베이스 비트 (쿵쿵)
                if (nextNoteTime % (step * 4) < 0.01) playNote(60, nextNoteTime, 0.1, 'sine', 0.06);
                nextNoteTime += dur * step;
            });
        }
        setTimeout(scheduler, 500); // 주기적으로 다음 마디 예약 (무한 반복)
    }
    scheduler();
}

function playLineSound() {
    playNote(1200, audioCtx.currentTime, 0.1, 'square', 0.1);
    playNote(2400, audioCtx.currentTime + 0.05, 0.1, 'square', 0.1);
}

// --- 게임 엔진 로직 ---
const canvas = document.getElementById('tetris');
const context = canvas.getContext('2d');
const nextCanvas = document.getElementById('next');
const nextContext = nextCanvas.getContext('2d');

context.scale(20, 20);
nextContext.scale(20, 20);

const colors = [null, '#FF0D72', '#0DC2FF', '#0DFF72', '#F538FF', '#FF8E0D', '#FFE138', '#3877FF'];

function createMatrix(w, h) {
    const matrix = [];
    while (h--) matrix.push(new Array(w).fill(0));
    return matrix;
}

function createPiece(type) {
    if (type === 'I') return [[0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0]];
    if (type === 'L') return [[0, 2, 0], [0, 2, 0], [0, 2, 2]];
    if (type === 'J') return [[0, 3, 0], [0, 3, 0], [3, 3, 0]];
    if (type === 'O') return [[4, 4], [4, 4]];
    if (type === 'Z') return [[5, 5, 0], [0, 5, 5], [0, 0, 0]];
    if (type === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
    if (type === 'T') return [[0, 7, 0], [7, 7, 7], [0, 0, 0]];
}

function draw() {
    context.fillStyle = '#000';
    context.fillRect(0, 0, canvas.width, canvas.height);
    drawMatrix(arena, {x: 0, y: 0}, context);
    drawGhost(player);
    drawMatrix(player.matrix, player.pos, context);
}

function drawNext() {
    nextContext.fillStyle = '#000';
    nextContext.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
    drawMatrix(player.next, {x: 1, y: 1}, nextContext);
}

function drawMatrix(matrix, offset, ctx) {
    matrix.forEach((row, y) => {
        row.forEach((value, x) => {
            if (value !== 0) {
                ctx.fillStyle = colors[value];
                ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
            }
        });
    });
}

function drawGhost(player) {
    const ghost = { pos: {x: player.pos.x, y: player.pos.y}, matrix: player.matrix };
    while (!collide(arena, ghost)) { ghost.pos.y++; }
    ghost.pos.y--;
    context.globalAlpha = 0.2;
    drawMatrix(ghost.matrix, ghost.pos, context);
    context.globalAlpha = 1.0;
}

function collide(arena, player) {
    const [m, o] = [player.matrix, player.pos];
    for (let y = 0; y < m.length; ++y) {
        for (let x = 0; x < m[y].length; ++x) {
            if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
        }
    }
    return false;
}

function merge(arena, player) {
    player.matrix.forEach((row, y) => {
        row.forEach((value, x) => {
            if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
        });
    });
}

function rotate(matrix, dir) {
    for (let y = 0; y < matrix.length; ++y) {
        for (let x = 0; x < y; ++x) [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
    }
    if (dir > 0) matrix.forEach(row => row.reverse());
    else matrix.reverse();
}

function arenaSweep() {
    let rowCount = 1;
    let cleared = false;
    outer: for (let y = arena.length - 1; y > 0; --y) {
        for (let x = 0; x < arena[y].length; ++x) {
            if (arena[y][x] === 0) continue outer;
        }
        const row = arena.splice(y, 1)[0].fill(0);
        arena.unshift(row);
        ++y;
        player.score += rowCount * 10;
        rowCount *= 2;
        cleared = true;
    }
    if (cleared) {
        playLineSound();
        if(player.score >= player.level * 100) {
            player.level++;
            dropInterval *= 0.85;
        }
    }
    updateScore();
}

function playerDrop() {
    player.pos.y++;
    if (collide(arena, player)) {
        player.pos.y--;
        merge(arena, player);
        playerReset();
        arenaSweep();
        return;
    }
    dropCounter = 0;
}

function playerMove(dir) {
    player.pos.x += dir;
    if (collide(arena, player)) player.pos.x -= dir;
}

function playerReset() {
    const pieces = 'ILJOTSZ';
    player.matrix = player.next || createPiece(pieces[pieces.length * Math.random() | 0]);
    player.next = createPiece(pieces[pieces.length * Math.random() | 0]);
    player.pos.y = 0;
    player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
    
    if (collide(arena, player)) {
        arena.forEach(row => row.fill(0));
        player.score = 0;
        player.level = 1;
        dropInterval = 1000;
        updateScore();
    }
    drawNext();
}

function playerRotate(dir) {
    const pos = player.pos.x;
    let offset = 1;
    rotate(player.matrix, dir);
    while (collide(arena, player)) {
        player.pos.x += offset;
        offset = -(offset + (offset > 0 ? 1 : -1));
        if (offset > player.matrix[0].length) {
            rotate(player.matrix, -dir);
            player.pos.x = pos;
            return;
        }
    }
}

let dropCounter = 0;
let dropInterval = 1000;
let lastTime = 0;
let gameRunning = false;

function update(time = 0) {
    if (!gameRunning) return;
    const deltaTime = time - lastTime;
    lastTime = time;
    dropCounter += deltaTime;
    if (dropCounter > dropInterval) playerDrop();
    draw();
    requestAnimationFrame(update);
}

function updateScore() {
    document.getElementById('score').innerText = player.score;
    document.getElementById('level').innerText = player.level;
}

const arena = createMatrix(12, 20);
const player = { pos: {x: 0, y: 0}, matrix: null, next: null, score: 0, level: 1 };

document.getElementById('start-msg').addEventListener('click', () => {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    document.getElementById('start-msg').style.display = 'none';
    gameRunning = true;
    startBGM(); // 무한 루프 BGM 시작
    playerReset();
    update();
});

document.addEventListener('keydown', event => {
    if (!gameRunning) return;
    if (event.keyCode === 37) playerMove(-1);
    else if (event.keyCode === 39) playerMove(1);
    else if (event.keyCode === 40) playerDrop();
    else if (event.keyCode === 81) playerRotate(-1);
    else if (event.keyCode === 87) playerRotate(1);
});

updateScore();
</script>
</body>
</html>
