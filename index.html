<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Tetris Bradinsky - Sound Effects Added</title>
    <style>
        body { background: #0f0f13; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .game-container { display: flex; gap: 25px; padding: 25px; background: #1c1c25; border-radius: 15px; box-shadow: 0 0 50px rgba(13, 194, 255, 0.2); position: relative; border: 1px solid #333; }
        #start-msg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; cursor: pointer; border-radius: 15px; }
        #start-msg h1 { color: #0dc2ff; margin: 0 0 10px 0; text-shadow: 0 0 10px #0dc2ff; pointer-events: none; }
        #start-msg p { font-size: 1.1em; color: #fff; animation: blink 1s infinite; pointer-events: none; }
        canvas { border: 3px solid #444; background-color: #000; border-radius: 5px; }
        .stats { display: flex; flex-direction: column; width: 160px; gap: 15px; }
        .stat-box { background: #2a2a35; padding: 15px; border-radius: 8px; text-align: center; border: 1px solid #444; }
        .stat-label { font-size: 0.75em; color: #0dc2ff; text-transform: uppercase; margin-bottom: 5px; }
        .stat-value { font-size: 1.6em; font-weight: bold; font-family: 'Courier New', monospace; }
        .controls { font-size: 0.75em; color: #777; line-height: 1.8; margin-top: auto; padding: 10px; background: #15151e; border-radius: 5px; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="game-container">
    <div id="start-msg">
        <h1>TETRIS - Bradinsky</h1>
        <p>CLICK TO START</p>
    </div>
    <canvas id="tetris" width="240" height="400"></canvas>
    <div class="stats">
        <div class="stat-box">
            <div class="stat-label">Next</div>
            <canvas id="next" width="100" height="100"></canvas>
        </div>
        <div class="stat-box">
            <div class="stat-label">Score</div>
            <div id="score" class="stat-value">0</div>
        </div>
        <div class="controls">
            <b>Arrows</b> : Move & Drop<br>
            <b>Q / W</b> : Rotate Left / Right
        </div>
    </div>
</div>

<script>
// --- 오디오 엔진 (BGM & 효과음) ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playNote(freq, start, duration, type = 'square', volume = 0.03) {
    if (freq === 0) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, start);
    gain.gain.setValueAtTime(volume, start);
    gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(start);
    osc.stop(start + duration);
}

// 점수 획득 시 효과음 함수
function playScoreSound() {
    const now = audioCtx.currentTime;
    playNote(880, now, 0.1, 'triangle', 0.1); // 높은 A음
    playNote(1320, now + 0.05, 0.15, 'triangle', 0.08); // 더 높은 E음
}

const bradinskyMelody = [
    [523.25, 1], [659.25, 1], [783.99, 1], [1046.50, 2], [987.77, 1], [880.00, 1], [783.99, 2],
    [698.46, 1], [880.00, 1], [1046.50, 1], [1396.91, 2], [659.25, 1], [587.33, 1], [523.25, 2]
];

function startBGM() {
    const step = 0.15;
    let nextNoteTime = audioCtx.currentTime;
    function scheduler() {
        while (nextNoteTime < audioCtx.currentTime + 0.2) {
            bradinskyMelody.forEach(([freq, dur]) => {
                playNote(freq, nextNoteTime, dur * step * 0.9, 'square', 0.02);
                nextNoteTime += dur * step;
            });
        }
        setTimeout(scheduler, 500);
    }
    scheduler();
}

// --- 게임 엔진 ---
const canvas = document.getElementById('tetris');
const context = canvas.getContext('2d');
const nextCanvas = document.getElementById('next');
const nextContext = nextCanvas.getContext('2d');

context.scale(20, 20);
nextContext.scale(20, 20);

const colors = [null, '#FF0D72', '#0DC2FF', '#0DFF72', '#F538FF', '#FF8E0D', '#FFE138', '#3877FF'];

function drawBlock(x, y, colorIndex, ctx) {
    const color = colors[colorIndex];
    ctx.fillStyle = color;
    ctx.fillRect(x, y, 1, 1);
    ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
    ctx.fillRect(x, y, 1, 0.1); ctx.fillRect(x, y, 0.1, 1);
    ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
    ctx.fillRect(x, y + 0.9, 1, 0.1); ctx.fillRect(x + 0.9, y, 0.1, 1);
}

function createMatrix(w, h) {
    const matrix = [];
    while (h--) matrix.push(new Array(w).fill(0));
    return matrix;
}

function createPiece(type) {
    if (type === 'I') return [[0, 2, 0, 0], [0, 2, 0, 0], [0, 2, 0, 0], [0, 2, 0, 0]];
    if (type === 'L') return [[0, 5, 0], [0, 5, 0], [0, 5, 5]];
    if (type === 'J') return [[0, 7, 0], [0, 7, 0], [7, 7, 0]];
    if (type === 'O') return [[6, 6], [6, 6]];
    if (type === 'Z') return [[4, 4, 0], [0, 4, 4], [0, 0, 0]];
    if (type === 'S') return [[0, 3, 3], [3, 3, 0], [0, 0, 0]];
    if (type === 'T') return [[0, 1, 0], [1, 1, 1], [0, 0, 0]];
}

function rotate(matrix, dir) {
    for (let y = 0; y < matrix.length; ++y) {
        for (let x = 0; x < y; ++x) {
            [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
        }
    }
    if (dir > 0) matrix.forEach(row => row.reverse());
    else matrix.reverse();
}

function collide(arena, player) {
    const [m, o] = [player.matrix, player.pos];
    for (let y = 0; y < m.length; ++y) {
        for (let x = 0; x < m[y].length; ++x) {
            if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
        }
    }
    return false;
}

function merge(arena, player) {
    player.matrix.forEach((row, y) => {
        row.forEach((value, x) => {
            if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
        });
    });
}

const arena = createMatrix(12, 20);
const player = { pos: {x: 0, y: 0}, matrix: null, next: null, score: 0 };

function playerRotate(dir) {
    const pos = player.pos.x;
    let offset = 1;
    rotate(player.matrix, dir);
    while (collide(arena, player)) {
        player.pos.x += offset;
        offset = -(offset + (offset > 0 ? 1 : -1));
        if (offset > player.matrix[0].length) {
            rotate(player.matrix, -dir);
            player.pos.x = pos;
            return;
        }
    }
}

function playerReset() {
    const pieces = 'ILJOTSZ';
    player.matrix = player.next || createPiece(pieces[pieces.length * Math.random() | 0]);
    player.next = createPiece(pieces[pieces.length * Math.random() | 0]);
    player.pos.y = 0;
    player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
    if (collide(arena, player)) arena.forEach(row => row.fill(0));
    
    nextContext.fillStyle = '#000';
    nextContext.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
    player.next.forEach((row, y) => {
        row.forEach((value, x) => {
            if (value !== 0) drawBlock(x + 1, y + 1, value, nextContext);
        });
    });
}

function playerDrop() {
    player.pos.y++;
    if (collide(arena, player)) {
        player.pos.y--;
        merge(arena, player);
        playerReset();
        // 라인 삭제 및 점수 효과음 로직
        outer: for (let y = arena.length - 1; y > 0; --y) {
            for (let x = 0; x < arena[y].length; ++x) {
                if (arena[y][x] === 0) continue outer;
            }
            arena.splice(y, 1);
            arena.unshift(new Array(12).fill(0));
            player.score += 10;
            playScoreSound(); // 효과음 재생
            y++;
        }
        document.getElementById('score').innerText = player.score;
    }
    dropCounter = 0;
}

let dropCounter = 0, dropInterval = 1000, lastTime = 0, gameRunning = false;

function update(time = 0) {
    if (!gameRunning) return;
    const deltaTime = time - lastTime;
    lastTime = time;
    dropCounter += deltaTime;
    if (dropCounter > dropInterval) playerDrop();
    
    context.fillStyle = '#000';
    context.fillRect(0, 0, canvas.width, canvas.height);
    arena.forEach((row, y) => row.forEach((value, x) => { if (value !== 0) drawBlock(x, y, value, context); }));
    player.matrix.forEach((row, y) => row.forEach((value, x) => { if (value !== 0) drawBlock(x + player.pos.x, y + player.pos.y, value, context); }));
    requestAnimationFrame(update);
}

document.getElementById('start-msg').addEventListener('click', function() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    this.style.display = 'none';
    gameRunning = true;
    startBGM();
    playerReset();
    update();
});

document.addEventListener('keydown', event => {
    if (!gameRunning) return;
    if (event.keyCode === 37) { player.pos.x--; if (collide(arena, player)) player.pos.x++; }
    else if (event.keyCode === 39) { player.pos.x++; if (collide(arena, player)) player.pos.x--; }
    else if (event.keyCode === 40) playerDrop();
    else if (event.keyCode === 81) playerRotate(-1);
    else if (event.keyCode === 87) playerRotate(1);
});
</script>
</body>
</html>
